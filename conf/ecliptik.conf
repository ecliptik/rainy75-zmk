# ── ecliptik daily-driver config overlay ─────────────────────────────────────
# Layered on top of conf/app.conf by build.sh (later assignments win), so our
# personal overrides live HERE and never touch upstream's conf/app.conf — that
# keeps `git rebase main` conflict-free on config. To customize the board, edit
# THIS file only (add/override CONFIG_* symbols); leave conf/app.conf as upstream.

# ── Deep sleep OFF (wired-only board) ──
# Upstream defaults CONFIG_ZMK_SLEEP=y. This board is used wired-only and deep
# sleep is a full power-off — waking took ~5 s (cold boot + USB re-enumeration)
# and the serial port re-enumerated each time. Off = instant response + a stable
# CDC ACM port. (With sleep off, upstream's CONFIG_ZMK_IDLE_SLEEP_TIMEOUT is inert.)
CONFIG_ZMK_SLEEP=n

# ── Activity-idle RGB blank ──
# Enable the upstreamed (default-off) idle-blank and run a 20-min timeout instead
# of upstream's 60 s. Blanks the per-key LEDs after inactivity and cuts the LED
# VCC rail (PC2) while dark; the first keypress restores it. USB/serial stay up.
CONFIG_ZMK_IDLE_TIMEOUT=1200000
CONFIG_RAINY_RGB_IDLE_BLANK=y

# ── NKRO ──
# No 6-key rollover limit (nice with chorded combos). Changes the HID descriptor
# -> after flashing, re-plug USB and re-pair BLE once so hosts re-read it. If any
# host misbehaves with the custom B91 USB driver, drop this line and reflash.
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# ── USB workqueue stack ──
# All usb_transfer completions (CDC ACM both directions + mcumgr SMP transport
# callbacks) run on the dedicated z_usb_work_q thread; the 1024 default leaves
# little headroom and a silent overflow would kill CDC bidirectionally until
# power cycle (one of the two suspects in the 2026-07 CDC-wedge investigation —
# the diag ring's WQ_STUCK event fingers it directly if it ever happens again).
CONFIG_USB_WORKQUEUE_STACK_SIZE=2048
